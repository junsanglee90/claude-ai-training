<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 페이지 | Claude AI 교육</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-admin">
      <div class="logo-mark">✦</div>
      <span class="header-admin-title">Claude AI 교육</span>
      <span class="admin-badge">ADMIN</span>
    </div>
    <button class="btn-logout" id="logoutBtn" onclick="logout()" style="display:none">로그아웃</button>
  </div>
</header>

<main class="main">

  <!-- ── 로그인 ── -->
  <section id="loginSection">
    <div class="card login-card">
      <div class="login-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="11" width="18" height="11" rx="2" stroke="#6366f1" stroke-width="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h2 class="login-title">관리자 로그인</h2>
      <p class="login-desc">관리자 비밀번호를 입력해 주세요.</p>
      <div class="form-group">
        <label for="adminPassword">비밀번호</label>
        <input type="password" id="adminPassword" placeholder="비밀번호 입력" autocomplete="off">
      </div>
      <p class="login-error" id="loginError"></p>
      <button class="btn btn--primary" onclick="login()">로그인</button>
      <div style="text-align:center; margin-top:16px;">
        <a href="index.html" style="font-size:13px; color:var(--text-light); text-decoration:none;">← 수강신청 페이지로</a>
      </div>
    </div>
  </section>

  <!-- ── 대시보드 ── -->
  <section id="dashboardSection" class="hidden">

    <!-- 전체 현황 -->
    <div class="stats-row">
      <div class="stat-card stat-card--total">
        <div class="stat-label">총 수강 정원</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card stat-card--reg">
        <div class="stat-label">현재 신청 인원</div>
        <div class="stat-value" id="statRegistered">—</div>
      </div>
      <div class="stat-card stat-card--avail">
        <div class="stat-label">신청 가능 인원</div>
        <div class="stat-value" id="statAvailable">—</div>
      </div>
    </div>

    <!-- 일정 탭 -->
    <div class="sched-tabs-wrap">
      <div class="sched-tabs-label">교육 일정 선택</div>
      <div class="sched-tabs" id="scheduleTabs"></div>
    </div>

    <!-- 신청자 목록 -->
    <div class="detail-section">

      <!-- 선택된 일정 정보 -->
      <div class="detail-top" id="detailHeader"></div>

      <!-- 추가 버튼 -->
      <div class="table-actions">
        <span class="table-actions-title">신청자 명단</span>
        <button class="btn-add-toggle" onclick="toggleAddForm()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v12M1 7h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
          신청자 추가
        </button>
      </div>

      <!-- 추가 폼 -->
      <div id="addFormSection" class="add-form-bar hidden">
        <div class="form-group">
          <label>소속 조직명</label>
          <input type="text" id="addOrg" placeholder="예) 개발팀" maxlength="50" autocomplete="off">
        </div>
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="addName" placeholder="홍길동" maxlength="20" autocomplete="off"
                 onkeydown="if(event.key==='Enter') submitAdd()">
        </div>
        <button class="btn-add-submit" onclick="submitAdd()">추가</button>
      </div>

      <!-- 테이블 -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:48px; text-align:center;">No.</th>
              <th>소속 조직명</th>
              <th>이름</th>
              <th style="width:100px; text-align:center;">신청일시</th>
              <th style="width:52px; text-align:center;">삭제</th>
            </tr>
          </thead>
          <tbody id="registrantTbody">
            <tr><td colspan="5" class="empty-cell">일정을 선택해 주세요.</td></tr>
          </tbody>
        </table>
      </div>

    </div>

  </section>

</main>

<script src="js/data.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
